<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Interest Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Monthly Interest Calculator</h1>
        <p class="subtitle">Calculate your monthly interest predictions</p>
        
        <form id="interestForm">
            <div class="input-group">
                <label for="lastPrincipal">Last Principal (End of Previous Month)</label>
                <input 
                    type="number" 
                    id="lastPrincipal" 
                    placeholder="Enter principal amount" 
                    step="0.1" 
                    value="10000"
                    required
                >
                <span class="currency">₹</span>
            </div>

            <div class="input-group">
                <label for="addedPrincipal">New Added Principal (This Month)</label>
                <input 
                    type="number" 
                    id="addedPrincipal" 
                    placeholder="Enter added principal" 
                    step="0.1" 
                    value="5000"
                    required
                >
                <span class="currency">₹</span>
            </div>

            <div class="input-group">
                <label for="daysRemaining">Days Until End of This Month</label>
                <input 
                    type="number" 
                    id="daysRemaining" 
                    placeholder="Enter days remaining" 
                    min="1" 
                    max="31" 
                    value="15"
                    required
                >
                <span class="unit">days</span>
            </div>

            <div class="input-group">
                <label for="interestRate">Annual Interest Rate</label>
                <input 
                    type="number" 
                    id="interestRate" 
                    placeholder="Enter interest rate" 
                    step="0.01" 
                    value="6"
                    required
                >
                <span class="unit">%</span>
            </div>

            <button type="button" class="calculate-btn" onclick="calculateInterest()">Calculate Interest</button>
        </form>

        <div id="results" class="results hidden">
            <div class="result-card">
                <div class="result-item">
                    <span class="result-label">Interest on Last Principal</span>
                    <span class="result-value" id="interestOnLast">₹0.00</span>
                </div>
            </div>

            <div class="result-card">
                <div class="result-item">
                    <span class="result-label">Interest on Added Principal</span>
                    <span class="result-value" id="interestOnAdded">₹0.00</span>
                </div>
            </div>

            <div class="result-card highlight">
                <div class="result-item">
                    <span class="result-label total">Total Interest This Month</span>
                    <span class="result-value total" id="totalInterest">₹0.00</span>
                </div>
            </div>

            <button type="button" class="reset-btn" onclick="resetForm()">Reset</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
